<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFF8E7" />
    <title>Que. — The Blind Taste Test</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Early intercept: if this is a receiver page (/v/XXX), redirect to
      // the static receiver.html before React even loads. This is the most
      // reliable approach — no SPA routing, no lazy loading, no document.write.
      (function() {
        var match = location.pathname.match(/^\/v\/([A-Z0-9]+)$/i);
        if (match) {
          location.replace('/receiver.html?id=' + match[1]);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
